{{template "base" .}}

{{define "title"}}Inscription — The Doom Forum{{end}}

{{define "content"}}
<div class="auth-container">
    <h2>Inscription</h2>
    {{if .Error}}
        <p class="error">{{.Error}}</p>
    {{end}}
    <form action="/register" method="POST">
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required placeholder="ton@email.com">
        </div>
        <div class="form-group">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username" required placeholder="DoomSlayer42">
        </div>
        <div class="form-group">
            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary">S'inscrire</button>
    </form>
    <p class="auth-link">Déjà un compte ? <a href="/login">Se connecter</a></p>
</div>
{{end}}
