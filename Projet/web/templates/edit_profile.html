{{template "base" .}}

{{define "title"}}Modifier mon profil — The Doom Forum{{end}}

{{define "content"}}
<div class="auth-container" style="max-width:600px;">
    <h2>✏️ Modifier mon profil</h2>
    <form action="/profile/edit" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label>Photo de profil (jpg, png, gif — max 20 Mo)</label>
            {{if .Avatar}}
                <img src="/static/uploads/{{.Avatar}}" alt="avatar actuel" style="width:60px;height:60px;border-radius:50%;object-fit:cover;border:2px solid var(--red);display:block;margin-bottom:0.5rem;">
            {{end}}
            <input type="file" name="avatar" accept=".jpg,.jpeg,.png,.gif">
        </div>
        <div class="form-group">
            <label>Nom d'utilisateur</label>
            <input type="text" name="username" value="{{.Username}}" required>
        </div>
        <div class="form-group">
            <label>Bio</label>
            <textarea name="bio" rows="4" placeholder="Parle de toi...">{{.Bio}}</textarea>
        </div>
        <div class="form-group">
            <label>Nouveau mot de passe (laisser vide pour ne pas changer)</label>
            <input type="password" name="password" placeholder="••••••••">
        </div>
        <button type="submit" class="btn-primary">💾 Sauvegarder</button>
    </form>
</div>
{{end}}
