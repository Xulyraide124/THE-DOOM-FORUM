{{template "base" .}}

{{define "title"}}Nouveau post — The Doom Forum{{end}}

{{define "content"}}
<div class="auth-container">
    <h2>Créer un post</h2>
    {{if .Error}}
        <p class="error">{{.Error}}</p>
    {{end}}
    <form action="/post/create" method="POST" enctype="multipart/form-data">
        <div class="form-group">
            <label for="title">Titre</label>
            <input type="text" id="title" name="title" required placeholder="Titre de ton post">
        </div>
        <div class="form-group">
            <label for="content">Contenu</label>
            <textarea id="content" name="content" required rows="8" placeholder="Écris ton post ici..."></textarea>
        </div>
        <div class="form-group">
            <label>Image ou GIF (optionnel — jpg, png, gif — max 20 Mo)</label>
            <input type="file" name="image" accept=".jpg,.jpeg,.png,.gif">
        </div>
        <div class="form-group">
            <label>Catégories (au moins une)</label>
            <div class="categories-check">
                {{range .Categories}}
                <label class="check-label">
                    <input type="checkbox" name="categories" value="{{.ID}}"> {{.Name}}
                </label>
                {{end}}
            </div>
        </div>
        <button type="submit" class="btn-primary">Publier</button>
    </form>
</div>
{{end}}
